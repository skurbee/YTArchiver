# ruff config — Python linter + formatter.
#
# Run:  ruff check .
# Fix:  ruff check --fix .
# Fmt:  ruff format .

# Match Python 3.13 (the build interpreter).
target-version = "py313"
line-length = 100

# Don't touch frozen / vendored / separate-clone dirs.
extend-exclude = [
    "Classic Tkinter ver",
    "GitHub Desktop",
]

[lint]
# Sensible default rules + a few hand-picked extras.
# - E,W: pycodestyle errors + warnings
# - F:   pyflakes (undefined names, unused imports, F401 star imports)
# - I:   isort (import order)
# - B:   bugbear (likely bugs)
# - UP:  pyupgrade (modern syntax suggestions)
# - C4:  comprehensions (cleaner list/dict comp)
# - PIE: misc lints (Pie)
select = ["E", "W", "F", "I", "B", "UP", "C4", "PIE"]

# Allow long lines in comments + docstrings — the patch-history comments
# scattered through the codebase aren't worth a reflow pass.
ignore = [
    "E501",   # line-too-long: project has many wide docstrings + URLs
    "E731",   # lambda-assignment: we use lambdas as ad-hoc helpers
    "E741",   # ambiguous-variable-name (l, I, O): legacy code uses these
    "E402",   # module-import-not-at-top: deliberate lazy/conditional imports
    "E701",   # one-line `try: ... except:` (colon-compound) is house style
    "E702",   # one-line semicolon-compound statements: same house style
    "B007",   # unused loop control variable: common style here
    "B008",   # function-call-in-default-argument: deliberate for some helpers
    "B024",   # abstract-base-class-without-abstract-method: not our pattern
    "B904",   # raise-without-from-inside-except: most exception handling is at boundary
    "UP015",  # redundant-open-modes: harmless and explicit
    "UP032",  # f-string: many .format() calls are intentional for clarity
]

# Star imports are intentional in backend/{sync,transcribe,metadata}/__init__.py
# (they're the re-export shims that surface each core.py's __all__).
[lint.per-file-ignores]
"backend/sync/__init__.py" = ["F401", "F403"]
"backend/transcribe/__init__.py" = ["F401", "F403"]
"backend/metadata/__init__.py" = ["F401", "F403"]
"backend/api_mixins/_shared.py" = ["F401", "F403"]
# Every api_mixin does `from ._shared import *`, so F405 (use of a name that
# *might* come from a star import) fires across all of them. The star-import
# surface is intentional (see backend/api_mixins/README.md), so silence F403/
# F405 there — this is what was burying the real B023/F821 findings.
"backend/api_mixins/*.py" = ["F401", "F403", "F405"]

[lint.isort]
known-first-party = ["backend"]
