<!DOCTYPE html>
<!--
  GENERATED OUTPUT NOTE:
  web/index.html is assembled from this template plus web/partials/*.html by
  backend/html_assembler.py. Edit this template or the partials, not the
  generated index.html. scripts/smoke.py verifies the generated output is
  fresh.

  YT Archiver — single-page UI shell rendered inside pywebview.

  Page structure (top to bottom in the source below):
    1. <header-strip>     App title + version label
    2. <tab-row>          Top-level tabs: Subs, Browse, Settings
                          (Recent used to live here too, now under Browse)
    3. <main>             Tab panels, only one visible at a time:
       - #panel-subs         Channel subscriptions table + Sync controls
       - #panel-browse       Library navigation: Channels grid, Search,
                             Graph, Bookmarks, Recent. Has its own
                             left sidebar that swaps the right pane.
       - #panel-settings     Per-channel + global settings, sync log
    4. Floating overlays (not in the tab flow):
       - #welcome-modal      First-launch archive-root picker (modal)
       - #ask-modal          Generic confirm/prompt modal used by
                             askConfirm() / askChoice() helpers in app.js
       - #context-menu       Right-click menu, repurposed per context
       - .drawer-livestreams Deferred-livestreams drawer slides up
                             from bottom-right
       - .mini-log           Tiny "tail of activity" panel docked at the
                             bottom of every tab so the user always
                             sees recent log activity
       - #sync-tasks-popup / #gpu-tasks-popup   Queue popups anchored
                             to their respective header badges
    5. <script src="vendor/chart.umd.min.js">  Chart.js for the
                             Browse > Graph charts
    6. <script src="logs.js"> + <script src="app.js">  The two JS
                             files that wire everything together — see
                             web/app.js header for its section map.

  All styling lives in styles.css. All behavior lives in app.js + logs.js.
  Python talks to this page via `window.pywebview.api.<method>` (defined
  by the Api class in main.py) and via `window._logBatch(payload)`
  which streams log lines in from the backend's LogStreamer.
-->

  <!-- Tab row. Download / Subs / Browse are the work tabs on the left.
       Health and Settings are grouped on the right as app/admin tabs. -->
  <div class="tab-row">
    <div class="tab active" data-tab="download">Download</div>
    <div class="tab" data-tab="subs">Subs</div>
    <div class="tab browse-tab" data-tab="browse">Browse</div>

  <!-- Global status bar — always-visible one-line summary of what the app
       is doing (sync / processing / indexing) so "what's happening?" has a
       single answer instead of being scattered across the log, the italic
       indicator line, two popover buttons, and the tray. Sync/Processing
       segments open their queue popovers; Log jumps to the full log. -->
  <div class="global-status-bar" id="global-status-bar">
    <button type="button" class="gsb-seg" id="gsb-sync" title="Sync queue — click for details">
      <span class="gsb-dot gsb-dot-sync"></span><span class="gsb-text" id="gsb-sync-text">Sync idle</span>
    </button>
    <span class="gsb-sep"></span>
    <button type="button" class="gsb-seg" id="gsb-gpu" title="Processing queue — click for details">
      <span class="gsb-dot gsb-dot-gpu"></span><span class="gsb-text" id="gsb-gpu-text">Processing idle</span>
    </button>
    <span class="gsb-seg gsb-index" id="gsb-index" hidden>
      <span class="gsb-index-text" id="gsb-index-text"></span>
      <span class="gsb-progress-track" id="gsb-progress-track" hidden
            role="progressbar" aria-label="Archive rescan progress"
            aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <span class="gsb-progress-fill" id="gsb-progress-fill"></span>
      </span>
    </span>
    <div class="gsb-spacer"></div>
    <button type="button" class="gsb-seg gsb-errors" id="gsb-errors" hidden
            aria-haspopup="dialog" aria-controls="popover-session-errors"
            title="Errors this session — click for details">
      <span id="gsb-errors-count">0</span> errors
    </button>
    <button type="button" class="gsb-seg gsb-log-btn" id="gsb-log-btn"
            title="Open the full activity log">Log</button>
  </div>
